bind -n M-n new-window
bind -n M-a previous-window
bind -n M-d next-window
bind -n M-A swap-window -d -t -1
bind -n M-D swap-window -d -t +1

# enable 256/true colors so the tokyonight palette renders correctly
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# mouse + scrollback
set -g mouse on
set -g history-limit 50000

# tokyonight storm — match nvim lualine
# bg_dark #1f2335  bg_highlight #292e42  fg #c0caf5  blue #7aa2f7  border #3b4261
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1f2335,fg=#c0caf5"

set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#1f2335,bold]  #S #[bg=#292e42,fg=#7aa2f7]#[bg=#292e42,fg=#c0caf5] #(whoami) #[bg=#1f2335,fg=#292e42]"

set -g status-right-length 80
set -g status-right "#[fg=#292e42,bg=#1f2335]#[bg=#292e42,fg=#c0caf5] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#292e42]#[bg=#7aa2f7,fg=#1f2335,bold] #h "

# inactive window
set -g window-status-format "#[bg=#1f2335,fg=#c0caf5] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-separator ""

# active window
set -g window-status-current-format "#[bg=#1f2335,fg=#7aa2f7]#[bg=#7aa2f7,fg=#1f2335,bold] #I:#W#{?window_flags,#{window_flags}, } #[bg=#1f2335,fg=#7aa2f7]"

# pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# command/message line
set -g message-style "bg=#292e42,fg=#7aa2f7"
set -g message-command-style "bg=#292e42,fg=#7aa2f7"

# mode (copy-mode selection)
set -g mode-style "bg=#7aa2f7,fg=#1f2335"
