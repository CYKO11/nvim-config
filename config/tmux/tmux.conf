bind -n M-n new-window -a -c "#{pane_current_path}"
bind -n M-a previous-window
bind -n M-d next-window

# alt+shift+a/d — move current window left/right in the window list
bind -n M-A swap-window -t -1\; select-window -t -1
bind -n M-D swap-window -t +1\; select-window -t +1

# alt+ctrl+hjkl — split current pane, new pane in that vim direction
bind -n C-M-h split-window -hb -c "#{pane_current_path}"
bind -n C-M-l split-window -h  -c "#{pane_current_path}"
bind -n C-M-k split-window -vb -c "#{pane_current_path}"
bind -n C-M-j split-window -v  -c "#{pane_current_path}"

# shift+alt+hjkl — resize current pane by 10 cells in that direction
bind -n M-H resize-pane -L 10
bind -n M-J resize-pane -D 10
bind -n M-K resize-pane -U 10
bind -n M-L resize-pane -R 10

# alt+hjkl — vim-style pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ctrl+alt+wasd — swap current pane with the neighbor in that direction
bind -n C-M-w swap-pane -t '{up-of}'    \; select-pane -t '{up-of}'
bind -n C-M-a swap-pane -t '{left-of}'  \; select-pane -t '{left-of}'
bind -n C-M-s swap-pane -t '{down-of}'  \; select-pane -t '{down-of}'
bind -n C-M-d swap-pane -t '{right-of}' \; select-pane -t '{right-of}'

# enable 256/true colors so the tokyonight palette renders correctly
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# mouse scrolling: wheel enters copy-mode and scrolls the scrollback buffer
set -g mouse on
set -g history-limit 50000

# disable drag-on-border pane resizing (use shift+alt+hjkl instead)
unbind -n MouseDrag1Border

# scroll by 3 lines per wheel notch instead of half a page
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down

# auto-copy any selection to the system clipboard
# set-clipboard on emits OSC52 so kitty copies it (works over SSH too)
set -g set-clipboard on
# clip = local clipboard tool if present (wayland/x11), else fall back to OSC52 only
clip='command -v wl-copy >/dev/null && wl-copy || (command -v xclip >/dev/null && xclip -selection clipboard -in || cat >/dev/null)'
# mouse drag release: copy selection + exit copy-mode (no lingering highlight)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$clip"
# y in copy-mode also copies and exits
bind -T copy-mode-vi y                  send-keys -X copy-pipe-and-cancel "$clip"

# extended keys (CSI-u) so chords like ctrl+shift+alt+h are distinguishable
# set -s extended-keys on
# set -as terminal-features ',xterm-kitty:extkeys'

# tokyonight storm — match nvim lualine
# bg_dark #1f2335  bg_highlight #292e42  fg #c0caf5  blue #7aa2f7  border #3b4261
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1f2335,fg=#c0caf5"

set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#1f2335,bold] #S  #[bg=#292e42,fg=#7aa2f7] #[bg=#292e42,fg=#c0caf5] #(whoami)   #[bg=#1f2335,fg=#292e42]"
set -g status-left-length 40

set -g status-right-length 120
set -g status-right "#[fg=#292e42,bg=#1f2335]#[bg=#292e42,fg=#c0caf5]  #(uptime -p | sed 's/up //')  %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#292e42]#[bg=#7aa2f7,fg=#1f2335,bold] #h  #(cat /sys/class/power_supply/BAT0/capacity)%% "

# inactive window
set -g window-status-format "#[bg=#1f2335,fg=#c0caf5] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-separator ""

# active window
set -g window-status-current-format "#[bg=#1f2335,fg=#7aa2f7]#[bg=#7aa2f7,fg=#1f2335,bold] #I:#W#{?window_flags,#{window_flags}, } #[bg=#1f2335,fg=#7aa2f7]"

# pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# per-pane status row below each pane: shows index + running command + cwd
set -g pane-border-status bottom
set -g pane-border-format " #[fg=#7aa2f7]#P #[fg=#c0caf5]#{pane_current_command} #[fg=#3b4261]· #[fg=#565f89]#{b:pane_current_path} "

# command/message line
set -g message-style "bg=#292e42,fg=#7aa2f7"
set -g message-command-style "bg=#292e42,fg=#7aa2f7"

# mode (copy-mode selection)
set -g mode-style "bg=#7aa2f7,fg=#1f2335"
